name: Build PDF Registry

on:
  push:
    branches: [main]
    paths:
      - "content/**"
      - "scripts/pdf/**"
      - "lib/pdf/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-registry:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prime Corepack for pnpm cache
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: 20.20.0
          cache: pnpm

      - name: Activate pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - run: npx tsx scripts/build-pdf-registry-json.ts

      - name: Commit registry if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet public/pdfs/registry.json || (
            git add public/pdfs/registry.json &&
            git commit -m "chore: update PDF registry [skip ci]" &&
            git push
          )

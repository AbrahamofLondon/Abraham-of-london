name: CI — Lint, Typecheck & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-22.04
    env:
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint (safe)
        # TODO: replace with strict command once build is stable
        # Currently non-blocking to allow merge during recovery.
        run: pnpm run lint:safe

      - name: Typecheck (safe)
        # TODO: replace with strict command once build is stable
        # Currently non-blocking to allow merge during recovery.
        run: pnpm run typecheck:safe

      - name: Typecheck (strict, informational)
        run: npx tsc --noEmit 2>&1 || true
        continue-on-error: true
        # Informational only. Will be made blocking
        # once all type errors are resolved.

      - name: Build Contentlayer
        run: pnpm run content:build

      - name: Build (Netlify-safe)
        # TODO: replace with strict command once build is stable
        # Currently non-blocking to allow merge during recovery.
        run: pnpm run build:netlify:safe

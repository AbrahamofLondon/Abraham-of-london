name: Content Asset Guard

on:
  pull_request:
    paths:
      - "content/**"
      - "public/assets/**"
  push:
    branches: [main]
    paths:
      - "content/**"
      - "public/assets/**"

jobs:
  asset-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prime Corepack for pnpm cache
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.0
          cache: pnpm

      - name: Activate pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
          pnpm --version

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build contentlayer
        run: pnpm contentlayer:build

      - name: Scan content assets
        run: pnpm assets:scan

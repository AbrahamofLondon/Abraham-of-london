name: Content Asset Guard

on:
  pull_request:
    paths:
      - "content/**"
      - "public/assets/**"
  push:
    branches: [main]
    paths:
      - "content/**"
      - "public/assets/**"

jobs:
  asset-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build contentlayer
        run: pnpm contentlayer:build

      - name: Scan content assets
        run: pnpm assets:scan

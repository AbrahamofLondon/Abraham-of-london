name: "Institutional Content Protection"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integrity-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.0
          cache: "pnpm"

      - name: Activate pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
          pnpm --version

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify MDX Integrity
        run: pnpm mdx:integrity

      - name: Verify MDX Gate
        run: pnpm mdx:gate

      - name: Verify Contentlayer Build
        run: pnpm contentlayer:build

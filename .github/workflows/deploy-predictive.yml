name: Deploy Readiness Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy-readiness:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install --no-frozen-lockfile

      - name: MDX gate
        run: pnpm mdx:gate

      - name: Contentlayer build
        run: pnpm contentlayer:clean && npx contentlayer2 build

      - name: MDX integrity
        run: pnpm mdx:integrity

      - name: TypeScript check
        run: npx tsc --noEmit 2>&1 || true
        # Informational — will be made strict when
        # all type errors are resolved

      - name: PDF registry
        run: npx tsx scripts/build-pdf-registry-json.ts

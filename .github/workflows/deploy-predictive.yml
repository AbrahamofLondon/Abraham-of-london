name: Deploy Readiness Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy-readiness:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prime Corepack for pnpm cache
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: 20.20.0
          cache: pnpm

      - name: Activate pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: MDX gate
        run: pnpm mdx:gate

      - name: Contentlayer build
        run: pnpm contentlayer:clean && npx contentlayer2 build

      - name: MDX integrity
        run: pnpm mdx:integrity

      - name: TypeScript check
        run: npx tsc --noEmit 2>&1 || true
        # Informational — will be made strict when
        # all type errors are resolved

      - name: PDF registry
        run: npx tsx scripts/build-pdf-registry-json.ts

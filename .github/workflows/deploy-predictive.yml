# .github/workflows/deploy-predictive.yml
name: Deploy Predictive Intelligence

on:
  push:
    branches: [main]
    paths:
      - 'lib/predictive/**'
      - 'app/api/predictive/**'
      - 'lib/decision/**'  # Added: decision engine dependencies
      - 'prisma/schema.prisma'  # Added: schema changes affect predictions
  pull_request:
    branches: [main]
    paths:
      - 'lib/predictive/**'
      - 'app/api/predictive/**'

env:
  NODE_VERSION: '20'
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  PREDICTIVE_MODEL_PATH: './models/predictive'

jobs:
  validate:
    name: Validate & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --frozen-lockfile
      
      - name: Type check
        run: npm run type-check
      
      - name: Lint predictive code
        run: |
          npm run lint -- --fix --ext .ts,.tsx lib/predictive app/api/predictive
      
      - name: Check formatting
        run: npm run format:check

  test:
    name: Test Predictive Intelligence
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --frozen-lockfile
      
      - name: Generate Prisma client
        run: npx prisma generate
      
      - name: Run predictive unit tests
        run: npm run test:predictive -- --coverage
        env:
          NODE_ENV: test
      
      - name: Run decision engine integration tests
        run: npm run test:decision -- --coverage
        env:
          NODE_ENV: test
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: predictive
          name: predictive-coverage
      
      - name: Validate coverage threshold
        run: |
          COVERAGE=$(npm run test:coverage -- --silent | grep -oP 'All files\s+\K[\d.]+')
          if (( $(echo "$COVERAGE < 90" | bc -l) )); then
            echo "❌ Coverage $COVERAGE% is below 90% threshold"
            exit 1
          fi
          echo "✅ Coverage $COVERAGE% meets threshold"

  benchmark:
    name: Model Performance Benchmark
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        run: npm ci --frozen-lockfile
      
      - name: Run predictive benchmarks
        run: npm run benchmark:predictive
        env:
          BENCHMARK_ITERATIONS: 1000
          BENCHMARK_WARMUP: 100
      
      - name: Store benchmark results
        uses: actions/upload-artifact@v3
        with:
          name: benchmark-results
          path: ./benchmarks/results/
          retention-days: 30
      
      - name: Compare with baseline
        run: |
          CURRENT_LATENCY=$(cat ./benchmarks/results/latency.json | jq '.p95')
          BASELINE_LATENCY=$(cat ./benchmarks/baseline.json | jq '.p95')
          DEGRADATION=$(echo "scale=2; ($CURRENT_LATENCY - $BASELINE_LATENCY) / $BASELINE_LATENCY * 100" | bc)
          
          if (( $(echo "$DEGRADATION > 15" | bc -l) )); then
            echo "⚠️ Performance degraded by ${DEGRADATION}% (exceeds 15% threshold)"
            echo "Current p95: ${CURRENT_LATENCY}ms"
            echo "Baseline p95: ${BASELINE_LATENCY}ms"
            # Uncomment to block deployment on severe degradation
            # exit 1
          fi

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test, benchmark]
    if: github.event_name == 'pull_request'
    environment: staging
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - run: npm ci --frozen-lockfile
      
      - name: Build predictive module
        run: npm run build:predictive
        env:
          NEXT_PUBLIC_PREDICTIVE_ENV: staging
      
      - name: Deploy to Vercel staging
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.ORG_ID }}
          vercel-project-id: ${{ secrets.PROJECT_ID }}
          vercel-args: '--prebuilt'
          github-comment: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, benchmark, deploy-staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: 
      name: production
      url: https://abrahamoflondon.com
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --frozen-lockfile --production=false
      
      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_PREDICTIVE_ENV: production
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
      
      - name: Run database migrations
        run: npm run migrate:deploy
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        continue-on-error: false
      
      - name: Verify predictive models
        run: npm run verify:models
        env:
          MODEL_VERSION: ${{ github.sha }}
      
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.ORG_ID }}
          vercel-project-id: ${{ secrets.PROJECT_ID }}
          vercel-args: '--prod --prebuilt'
          github-comment: false
      
      - name: Health check
        run: |
          sleep 30
          curl -f https://abrahamoflondon.com/api/predictive/health || exit 1
          curl -f https://abrahamoflondon.com/api/decision/health || exit 1
      
      - name: Notify on success
        if: success()
        uses: actions/github-script@v6
        with:
          script: |
            const { createBotComment } = await import('./.github/scripts/notify-deploy.js');
            await createBotComment({
              context,
              message: `✅ Predictive Intelligence deployed successfully\n📦 Version: ${process.env.GITHUB_SHA}\n⏱️ Deployed at: ${new Date().toISOString()}\n🔗 [View Deployment](https://abrahamoflondon.com)`
            });
      
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            const { createBotComment } = await import('./.github/scripts/notify-deploy.js');
            await createBotComment({
              context,
              message: `❌ Predictive Intelligence deployment failed\n📦 Version: ${process.env.GITHUB_SHA}\n🔍 Check workflow logs for details`
            });

  rollback:
    name: Rollback Capability
    runs-on: ubuntu-latest
    needs: deploy-production
    if: failure()
    environment: production
    steps:
      - name: Trigger Vercel rollback
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.ORG_ID }}
          vercel-project-id: ${{ secrets.PROJECT_ID }}
          vercel-args: '--rollback'
      
      - name: Notify rollback
        uses: actions/github-script@v6
        with:
          script: |
            console.log('🔄 Rollback triggered for predictive intelligence deployment');
name: Foundry CI Gate

on:
  pull_request:
    branches: [main, production]
  push:
    branches: [main, production]

jobs:
  foundry-gate:
    name: Intelligence Foundry Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check Foundry CI Gate
        env:
          FOUNDRY_GATE_URL: ${{ secrets.FOUNDRY_GATE_URL }}
          FOUNDRY_API_KEY: ${{ secrets.FOUNDRY_API_KEY }}
        run: |
          # ── Guard: skip gracefully when secrets are not configured ──────────
          if [ -z "$FOUNDRY_GATE_URL" ]; then
            echo "FOUNDRY_GATE_URL secret is not set — skipping Foundry gate check."
            echo "Configure the secret to enable blocking gate enforcement."
            exit 0
          fi

          # ── POST to the gate endpoint ────────────────────────────────────────
          # Route only accepts POST; GET returns 405.
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $FOUNDRY_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"branch\":\"$GITHUB_REF_NAME\",\"releaseId\":\"$GITHUB_SHA\"}" \
            "$FOUNDRY_GATE_URL/api/admin/intelligence-foundry/ci-gate")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Gate HTTP status: $HTTP_CODE"
          echo "Gate response:    $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo ""
            echo "ERROR: Gate endpoint returned HTTP $HTTP_CODE"
            echo "Expected 200. Check that FOUNDRY_GATE_URL points to a live deployment"
            echo "and FOUNDRY_API_KEY matches FOUNDRY_CI_API_KEY on the server."
            exit 1
          fi

          # ── Parse gate decision ──────────────────────────────────────────────
          BLOCKED=$(echo "$BODY" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('block', False))")

          if [ "$BLOCKED" = "True" ]; then
            echo ""
            echo "FOUNDRY GATE BLOCKED — unresolved CRITICAL findings or RED product surfaces."
            echo ""
            echo "$BODY" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          crit = d.get('criticalUnresolved', 0)
          ph   = d.get('productHealth', {})
          red  = ph.get('red', 0)
          print(f'  Critical/HIGH unresolved runs : {crit}')
          print(f'  RED product surfaces          : {red}')
          msg = d.get('message', '')
          if msg:
              print(f'  Message: {msg}')
          "
            echo ""
            echo "Resolve all CRITICAL ACTION_REQUIRED findings before merging."
            exit 1
          fi

          echo "Foundry gate passed. No blocking findings."

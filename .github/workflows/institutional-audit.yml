name: Institutional Portfolio Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    name: Validate Portfolio Integrity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Prisma Client Generation
        run: pnpm prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Contentlayer Build
        run: pnpm contentlayer:build

      - name: TypeScript Check (non-blocking)
        run: pnpm typecheck:safe

      - name: MDX Integrity
        run: pnpm mdx:integrity

      - name: MDX Gate
        run: pnpm mdx:gate

      - name: PDF Registry Verification
        run: |
          echo "Checking Intelligence Briefs for encoding integrity..."
          find . -name "*.mdx" -not -path "./node_modules/*" -exec grep -l $'\xEF\xBB\xBF' {} + 2>/dev/null | xargs -r echo "Warning: BOM detected in:" || true
          find . -name "*.mdx" -not -path "./node_modules/*" -exec grep -l $'\x00' {} + 2>/dev/null | xargs -r echo "Error: Null byte detected in:" || true

      - name: Next.js Build (safe)
        run: pnpm build:netlify:safe

name: Lighthouse

on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  lhci:
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.0
          cache: pnpm

      - name: Activate pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js (safe)
        run: pnpm build:netlify:safe

      - name: Start server
        run: pnpm exec next start -p 3000 &

      - name: Wait for server
        run: pnpm dlx wait-on@7 http://localhost:3000 --timeout 60000

      - name: Lighthouse CI
        run: pnpm dlx @lhci/cli@0.13.x autorun --config=.lighthouserc.json --upload.target=temporary-public-storage
        continue-on-error: true

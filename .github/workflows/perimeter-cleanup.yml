name: Institutional Perimeter Cleanup

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Key Revocation
        run: |
          DOMAIN="${{ secrets.SITE_DOMAIN }}"
          if [ -z "$DOMAIN" ]; then
            echo "SITE_DOMAIN secret not set — skipping"
            exit 0
          fi
          curl -s -X POST "https://${DOMAIN}/api/cron/clean-keys" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 30 || echo "Cleanup endpoint unreachable (non-fatal)"

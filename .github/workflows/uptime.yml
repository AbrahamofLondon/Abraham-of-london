name: Uptime Check

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 */6 * * *"  # Every 6 hours instead of every 30 minutes

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://www.abrahamoflondon.org/)
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Site returned $STATUS"
            exit 1
          fi

      - name: API health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://www.abrahamoflondon.org/api/health 2>/dev/null || echo "000")
          echo "API status: $STATUS"
        continue-on-error: true

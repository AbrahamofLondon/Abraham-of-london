services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: aol_dev
      POSTGRES_USER: aol
      POSTGRES_PASSWORD: aol_local
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aol -d aol_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pdf-generator:
    build: .
    profiles: ["pdf"]
    environment:
      - DATABASE_URL=postgresql://aol:aol_local@postgres:5432/aol_dev?schema=public
      - DIRECT_URL=postgresql://aol:aol_local@postgres:5432/aol_dev?schema=public
      - REDIS_URL=redis://redis:6379
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
      - PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./public/briefs:/app/public/briefs
      - ./content/briefs:/app/content/briefs
      - ./lib/pdf:/app/lib/pdf

volumes:
  postgres_data:
  redis_data:

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: aol_dev
      POSTGRES_USER: aol
      POSTGRES_PASSWORD: aol_local
    ports:
      - "55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aol -d aol_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pdf-generator:
    build: .
    profiles: ["pdf"]
    environment:
      - DATABASE_URL=postgresql://aol:aol_local@postgres:5432/aol_dev?schema=public
      - DIRECT_URL=postgresql://aol:aol_local@postgres:5432/aol_dev?schema=public
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL:-}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN:-}
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
      - PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./public/briefs:/app/public/briefs
      - ./content/briefs:/app/content/briefs
      - ./lib/pdf:/app/lib/pdf

volumes:
  postgres_data:

# netlify.toml — Abraham of London
# Minimal, adapter-first Netlify config for modern Next.js

[build]
  # `publish` is set explicitly so @netlify/plugin-nextjs does not error
  # with "publish directory cannot be the same as the base directory".
  # The plugin manages `.next` output internally; pointing publish at it
  # satisfies the plugin's base-vs-publish sanity check without fighting
  # its internal file placement.
  publish = ".next"
  command = "pnpm build:netlify"

[build.environment]
  NODE_VERSION = "20.20.0"
  NODE_OPTIONS = "--max-old-space-size=7168"
  CI = "true"
  NEXT_TELEMETRY_DISABLED = "1"
  NEXT_DISABLE_SOURCEMAPS = "true"
  CONTENTLAYER_DISABLE_WARNINGS = "1"
  NETLIFY_USE_PNPM = "true"
  PNPM_FLAGS = "--frozen-lockfile"
  PNPM_VERSION = "10.29.3"
  # RECAPTCHA_TIMEOUT_MS value is a plain number (e.g. 5000) that naturally
  # appears as a literal throughout the codebase — not a real secret leak.
  # DB_PASSWORD appears only in docker-compose.yml (dev-only).
  SECRETS_SCAN_OMIT_KEYS = "RECAPTCHA_TIMEOUT_MS,DB_PASSWORD"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[plugins]]
  package = "@netlify/plugin-emails"

# Keep this block ONLY if these are genuinely custom non-Next functions
# that you still use. If not, delete the whole block.
[functions]
  directory = "netlify/functions_src/functions"
  node_bundler = "nft"
  # Keep the Prisma client and its generated client package OUT of the
  # function zip. They resolve from the Netlify runtime layer instead.
  # This drops ~60 MB of traced weight out of `___netlify-server-handler`.
  external_node_modules = [
    "@prisma/client",
    ".prisma",
    "prisma",
  ]

# Strip the handler package from ~1.1 GB to <250 MB by removing
# directories that should never be in a serverless function.
# `outputFileTracingExcludes` in next.config.mjs is supposed to handle
# this, but the plugin-nextjs trace copy does not honour all of those
# patterns. The Netlify-native `excluded_files` directive IS enforced.
[functions."___netlify-server-handler"]
  excluded_files = [
    # Recursive self-inclusion: the plugin copies .netlify/ into the handler
    # because outputFileTracingRoot = process.cwd(), and .netlify/ is under cwd.
    ".netlify/**",
    # Static assets are served via Netlify CDN, not the function.
    "public/**",
    "public/assets/**",
    # Contentlayer build cache — runtime only needs the _index.json files.
    ".contentlayer/.cache/**",
    # Build tools / dev-only dirs that have no place in a Lambda function.
    "tests/**",
    "scripts/**",
    ".agents/**",
    ".github/**",
    ".husky/**",
    "playwright-report/**",
    "briefs-contamination-backup/**",
    "deepseek-terminal-chat/**",
    "triage_hold/**",
    "CRM/**",
    "OGR/**",
    "src/**",
    # Build-only node_modules already in next.config.mjs excludes but
    # not consistently honoured by the trace copy.
    "node_modules/sass/**",
    "node_modules/@esbuild/**",
    "node_modules/webpack/**",
    "node_modules/@img/**",
    "node_modules/typescript/**",
    "node_modules/puppeteer/**",
    "node_modules/puppeteer-core/**",
    "node_modules/@puppeteer/**",
    "node_modules/chrome-headless-shell/**",
    "node_modules/.cache/**",
  ]

[functions.emails]
  included_files = ["emails/**", "./emails/**"]
  node_bundler = "esbuild"

[[schedule]]
  path = "/api/cleanup-download-tokens"
  schedule = "0 2 * * *"

[[schedule]]
  path = "/api/cron/escalation"
  schedule = "0 */6 * * *"

[[schedule]]
  path = "/api/cron/decision-state"
  schedule = "0 */12 * * *"

[context.production.environment]
  NEXT_PUBLIC_SITE_URL = "https://www.abrahamoflondon.org"
  NEXT_PUBLIC_APP_ENV = "production"

[context.deploy-preview.environment]
  NEXT_PUBLIC_APP_ENV = "staging"
  NEXT_DISABLE_SOURCEMAPS = "true"

[[redirects]]
  from = "https://abrahamoflondon.org/*"
  to = "https://www.abrahamoflondon.org/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/essays/*"
  to = "/blog/:splat"
  status = 301

[[redirects]]
  from = "/downloads/vault/*"
  to = "/vault/:splat"
  status = 301

[[redirects]]

# netlify.toml — Abraham of London
# Minimal, adapter-first Netlify config for modern Next.js

[build]
  command = """
    pnpm build:netlify && \
    echo '===BUILD DIAGNOSTIC===' && \
    du -sh .next 2>/dev/null || true && \
    du -sh .next/server 2>/dev/null || true && \
    find .next -type f -name '*.js' -size +10M -exec ls -lh {} \\; 2>/dev/null || true && \
    echo '===END DIAGNOSTIC===' && \
    (node scripts/diagnostic/chunk-inspector.mjs || echo '===END CHUNK MANIFEST===') && \
    (node scripts/diagnostic/stats-analyzer.mjs || echo '===END STATS===')
  """

[build.environment]
  NODE_VERSION = "20.20.0"
  NODE_OPTIONS = "--max-old-space-size=4096"
  CI = "true"
  NEXT_TELEMETRY_DISABLED = "1"
  NEXT_DISABLE_SOURCEMAPS = "true"
  CONTENTLAYER_DISABLE_WARNINGS = "1"
  NETLIFY_USE_PNPM = "true"
  PNPM_FLAGS = "--frozen-lockfile"
  PNPM_VERSION = "10.29.3"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[plugins]]
  package = "@netlify/plugin-emails"

# Keep this block ONLY if these are genuinely custom non-Next functions
# that you still use. If not, delete the whole block.
[functions]
  directory = "netlify/functions_src/functions"

[functions.emails]
  included_files = ["emails/**", "./emails/**"]
  node_bundler = "esbuild"

[[schedule]]
  path = "/api/cleanup-download-tokens"
  schedule = "0 2 * * *"

[context.production.environment]
  NEXT_PUBLIC_SITE_URL = "https://www.abrahamoflondon.org"
  NEXT_PUBLIC_APP_ENV = "production"

[context.deploy-preview.environment]
  NEXT_PUBLIC_APP_ENV = "staging"
  NEXT_DISABLE_SOURCEMAPS = "true"

[[redirects]]
  from = "https://abrahamoflondon.org/*"
  to = "https://www.abrahamoflondon.org/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/essays/*"
  to = "/blog/:splat"
  status = 301

[[redirects]]
  from = "/downloads/vault/*"
  to = "/vault/:splat"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
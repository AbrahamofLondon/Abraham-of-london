<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9B8EC4" stop-opacity="0"/>
      <stop offset="0.3" stop-color="#9B8EC4" stop-opacity="0.5"/>
      <stop offset="0.7" stop-color="#9B8EC4" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#9B8EC4" stop-opacity="0"/>
    </linearGradient>
    <!-- Sovereign geometry — concentric arcs -->
    <g opacity="0.06">
      <circle cx="900" cy="315" r="200" fill="none" stroke="#9B8EC4" stroke-width="0.5"/>
      <circle cx="900" cy="315" r="160" fill="none" stroke="#9B8EC4" stroke-width="0.3"/>
      <circle cx="900" cy="315" r="120" fill="none" stroke="#9B8EC4" stroke-width="0.3"/>
    </g>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Sovereign geometry — subtle -->
  <circle cx="900" cy="315" r="200" fill="none" stroke="#9B8EC4" opacity="0.06" stroke-width="0.5"/>
  <circle cx="900" cy="315" r="160" fill="none" stroke="#9B8EC4" opacity="0.04" stroke-width="0.3"/>
  <circle cx="900" cy="315" r="120" fill="none" stroke="#9B8EC4" opacity="0.04" stroke-width="0.3"/>
  <!-- Violet accent rule -->
  <rect x="80" y="240" width="4" height="150" fill="#9B8EC4" opacity="0.6"/>
  <!-- Top rule line -->
  <line x1="80" y1="230" x2="1120" y2="230" stroke="url(#line)" stroke-width="0.5"/>
  <!-- Bottom rule line -->
  <line x1="80" y1="420" x2="1120" y2="420" stroke="url(#line)" stroke-width="0.5"/>
  <!-- Text hierarchy -->
  <text font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#9B8EC4" opacity="0.7" letter-spacing="6" x="100" y="280">ABRAHAM OF LONDON</text>
  <text font-family="'Cormorant Garamond', Georgia, serif" font-size="52" fill="#ffffff" opacity="0.92" x="100" y="340" font-style="italic">Sovereign Intelligence</text>
  <text font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="rgba(255,255,255,0.45)" letter-spacing="2" x="100" y="380">Strategic autonomy, institutional freedom, and the cost of borrowed legitimacy</text>
  <text font-family="'JetBrains Mono', 'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="3" x="100" y="405">Intelligence Briefs series</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="0"/>
      <stop offset="0.3" stop-color="#C9A96E" stop-opacity="0.5"/>
      <stop offset="0.7" stop-color="#C9A96E" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#C9A96E" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Archive/document texture -->
  <g stroke="rgba(255,255,255,0.025)" stroke-width="0.3" fill="none">
    <rect x="60" y="80" width="1080" height="470" rx="2"/>
    <line x1="100" y1="120" x2="1100" y2="120"/>
    <line x1="100" y1="140" x2="800" y2="140"/>
    <line x1="100" y1="160" x2="900" y2="160"/>
    <line x1="100" y1="180" x2="600" y2="180"/>
    <line x1="100" y1="440" x2="1100" y2="440"/>
    <line x1="100" y1="460" x2="700" y2="460"/>
    <line x1="100" y1="480" x2="850" y2="480"/>
  </g>
  <!-- Gold accent rule -->
  <rect x="80" y="240" width="4" height="150" fill="#C9A96E" opacity="0.7"/>
  <!-- Top rule line -->
  <line x1="80" y1="230" x2="1120" y2="230" stroke="url(#line)" stroke-width="0.5"/>

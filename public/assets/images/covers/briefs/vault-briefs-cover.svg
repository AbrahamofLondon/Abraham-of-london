  <text font-family="'Cormorant Garamond', Georgia, serif" font-size="52" fill="#ffffff" opacity="0.92" x="100" y="340" font-style="italic">Vault Briefs</text>
  <text font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="rgba(255,255,255,0.45)" letter-spacing="2" x="100" y="380">Canon doctrine, governance frameworks, and institutional resilience sequences</text>
  <text font-family="'JetBrains Mono', 'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="3" x="100" y="405">Foundational Canon · Frontier Resilience</text>
